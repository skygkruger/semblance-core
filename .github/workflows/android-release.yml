name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Setup Android SDK + NDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Decode signing keystore
      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > packages/mobile/android/app/release.keystore
          printf 'storeFile=release.keystore\n' > packages/mobile/android/keystore.properties
          printf 'storePassword=%s\n' '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' >> packages/mobile/android/keystore.properties
          printf 'keyAlias=%s\n' '${{ secrets.ANDROID_KEY_ALIAS }}' >> packages/mobile/android/keystore.properties
          printf 'keyPassword=%s\n' '${{ secrets.ANDROID_KEY_PASSWORD }}' >> packages/mobile/android/keystore.properties

      # Update version
      - name: Set Version
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ inputs.version }}\"/" packages/mobile/android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" packages/mobile/android/app/build.gradle

      # Build release AAB (Android App Bundle)
      - name: Build Release AAB
        run: cd packages/mobile/android && ./gradlew bundleRelease

      # Build release APK for sideloading
      - name: Build Release APK
        run: cd packages/mobile/android && ./gradlew assembleRelease

      # Upload AAB as artifact
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: semblance-release-aab-${{ inputs.version }}
          path: packages/mobile/android/app/build/outputs/bundle/release/app-release.aab

      # Upload APK as artifact for sideloading
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: semblance-release-apk-${{ inputs.version }}
          path: packages/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk

      # Upload to Play Store internal track (disabled — not uploading yet)
      - name: Upload to Play Store
        if: false
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: run.semblance.app
          releaseFiles: packages/mobile/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

      # Cleanup secrets
      - name: Cleanup
        if: always()
        run: |
          rm -f packages/mobile/android/app/release.keystore
          rm -f packages/mobile/android/keystore.properties
